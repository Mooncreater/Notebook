      - 数学基础: notes/perfessional/CG/note/basic.md
      - 二维图元算法: notes/perfessional/CG/note/2d.md
      - 消影算法: notes/perfessional/CG/note/warnock.md
      - 光影渲染: notes/perfessional/CG/note/light_shading.md
      - 光照 (全局): notes/perfessional/CG/note/light.md
      - 纹理映射: notes/perfessional/CG/note/texture_mapping.md
      - 剔除与裁剪: notes/perfessional/CG/note/outter_dectected.md

    - 数据挖掘:
