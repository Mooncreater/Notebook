site_name: 一只烤鱼的笔记本

site_url: https://mooncreater.github.io/Notebook/
repo_name: Mooncreater/Notebook 
repo_url: https://github.com/Mooncreater/Notebook  

theme:
  name: material
  custom_dir: overrides
  language: zh
  favicon: log.jpg
  logo: log.jpg
  font:
    text: LXGW WenKai Screen
    code: JetBrains Mono
 # custom_dir: custom_theme/


  # ---------- 功能开关 (把搜索相关功能也加进来) ----------
  features:
    - content.code.annotate
    - navigation.tracking
    - navigation.tabs
    - navigation.path     # 启用路径导航
    - navigation.indexes
    - navigation.tabs.sticky  # 如果你想要粘性标签页
    - navigation.top          # 返回顶部按钮
    - search.suggest          # 搜索建议
    - search.highlight        # 搜索结果高亮
    - content.code.copy       # 代码块复制按钮 (可选)
  # ---------- 亮/暗色切换配置 (你已有的) ----------

  palette:
    # 亮色模式
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: brown  # 👈 直接设为 brown
      accent: brown   # 强调色也可以设 brown
      toggle:
        icon: material/weather-sunny
        name: 切换到暗色模式

    # 暗色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: brown
      accent: brown
      toggle:
        icon: material/weather-night
        name: 切换到亮色模式

# ---------- 插件配置 (确保 search 插件被正确启用) ----------
plugins:      
  - statistics    
  - search 
  - changelog       

  - git-revision-date-localized:
      type: datetime
      timezone: Asia/Shanghai
      locale: zh
      enable_creation_date: true

markdown_extensions:
  - toc:
      permalink: true
      toc_depth: 4
  - footnotes      
  - meta
  - def_list
  - attr_list
  - md_in_html
  - sane_lists
  - admonition
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.critic
  - pymdownx.details
  - pymdownx.snippets
  - pymdownx.magiclink
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.smartsymbols  #智能符号
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tabbed:
      alternate_style: true 
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - js/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
  - js/baidu-tongji.js
  - https://gcore.jsdelivr.net/npm/katex@0.15.1/dist/katex.min.js
  - js/katex.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

extra_css:
  - https://gcore.jsdelivr.net/npm/katex@0.15.1/dist/katex.min.css
  - https://gcore.jsdelivr.net/npm/lxgw-wenkai-screen-webfont@1.1.0/style.css
  - https://gcore.jsdelivr.net/npm/lxgw-wenkai-webfont@1.1.0/style.css
  - fonts/title.css
  - stylesheets/extra.css 

nav:
