      - notes/perfessional/NLP/note/index.md
      - 基础概念: notes/perfessional/NLP/note/abstruct.md

    - 机器学习:
      - notes/perfessional/ML/index.md
      - 概念: notes/perfessional/ML/abstruct.md
      - 基本术语和模型评估: notes/perfessional/ML/base.md 
      - 线性模型: notes/perfessional/ML/chapter3.md
      - 决策树: notes/perfessional/ML/chapter4.md
      - 神经网络: notes/perfessional/ML/chapter5.md
      - 支持向量机: notes/perfessional/ML/chapter6.md
      - 贝叶斯分类器: notes/perfessional/ML/chapter7.md
      - 集成方法: notes/perfessional/ML/chapter8.md
      - 聚类: notes/perfessional/ML/chapter9.md
      - 降维与度量学习: notes/perfessional/ML/chapter10.md
      - 特征选择与稀疏学习: notes/perfessional/ML/chapter11.md
      - 半监督学习: notes/perfessional/ML/chapter12.md
  - 规范:
